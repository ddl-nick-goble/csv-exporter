<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Governance Evidence Exporter</title>
  <script>
    // Apply theme before paint to avoid a flash. Mirrors src/theme.js.
    (function () {
      try {
        var stored = null;
        try {
          var m = document.cookie.split('; ').find(function(r) { return r.indexOf('governance-exporter:theme=') === 0; });
          if (m) stored = m.split('=')[1];
        } catch (e) {}
        document.documentElement.setAttribute('data-theme', stored === 'dark' ? 'dark' : 'light');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
